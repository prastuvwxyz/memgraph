version: 2

project_name: memgraph

before:
  hooks:
    - go mod tidy

builds:
  - id: memgraph
    main: ./cmd/memgraph
    binary: memgraph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

universal_binaries:
  - ids: [memgraph]
    replace: true

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge "

release:
  github:
    owner: prastuvwxyz
    name: memgraph
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
